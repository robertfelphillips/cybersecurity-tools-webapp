services:
  - type: web
    name: cybersecurity-tools-webapp
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 3 -b 0.0.0.0:$PORT app.app:app
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: SCANNER_ALLOWED_HOSTS
        value: 127.0.0.1,localhost,::1
